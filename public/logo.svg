<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 72" fill="none">
  <!-- Shield left half (white) -->
  <clipPath id="left-half">
    <rect x="0" y="0" width="32" height="72"/>
  </clipPath>
  <clipPath id="right-half">
    <rect x="32" y="0" width="32" height="72"/>
  </clipPath>

  <!-- Shield outline -->
  <path d="M32 2L4 16v20c0 17.6 11.9 34 28 38 16.1-4 28-20.4 28-38V16L32 2z" stroke="#52b788" stroke-width="2.5" fill="none"/>

  <!-- Left half - white fill -->
  <g clip-path="url(#left-half)">
    <path d="M32 2L4 16v20c0 17.6 11.9 34 28 38 16.1-4 28-20.4 28-38V16L32 2z" fill="#ffffff"/>
  </g>

  <!-- Right half - green gradient fill -->
  <g clip-path="url(#right-half)">
    <path d="M32 2L4 16v20c0 17.6 11.9 34 28 38 16.1-4 28-20.4 28-38V16L32 2z" fill="url(#green-grad)"/>
  </g>

  <!-- Shield outline on top -->
  <path d="M32 2L4 16v20c0 17.6 11.9 34 28 38 16.1-4 28-20.4 28-38V16L32 2z" stroke="#52b788" stroke-width="2.5" fill="none"/>

  <!-- Center dividing line -->
  <line x1="32" y1="6" x2="32" y2="70" stroke="#52b788" stroke-width="1" opacity="0.3"/>

  <!-- Checkmark -->
  <path d="M20 36l8 8 16-16" stroke="#2d6a4f" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <defs>
    <linearGradient id="green-grad" x1="32" y1="2" x2="64" y2="72">
      <stop offset="0%" stop-color="#74c69d"/>
      <stop offset="100%" stop-color="#52b788"/>
    </linearGradient>
  </defs>
</svg>
